taskGroups:
  - taskSpec:
      runnables:
        # Download the model from Hugging Face
        - container:
            imageUri: ${ARTIFACT_REGISTRY}/${JETSTREAM_MAXTEXT_IMAGE}:${JETSTREAM_MAXTEXT_VERSION}
            entrypoint: "/bin/sh"
            commands:
              - "-c"
              - mkdir -p ${LOCAL_CKPT_BASE_PATH}/models/ && echo "Downloading model ${HF_MODEL_NAME}" && hf download ${HF_MODEL_NAME} --local-dir ${LOCAL_CKPT_BASE_PATH}/models/fp8
        # Run the conversion script
        - container:
            imageUri: ${ARTIFACT_REGISTRY}/${JETSTREAM_MAXTEXT_IMAGE}:${JETSTREAM_MAXTEXT_VERSION}
            entrypoint: "/bin/sh"
            commands:
              - "-c"
              - echo "Converting checkpoint from fp8 to bf16" && cd /convert && python3 convert_bf16.py --input-fp8-hf-path ${LOCAL_CKPT_BASE_PATH}/models/fp8 --output-bf16-hf-path ${LOCAL_CKPT_BASE_PATH}/models/bf16
        # Run the unscanned checkpoint conversion from bf16 to maxtext/unscanned format
        - container:
            imageUri: ${ARTIFACT_REGISTRY}/${JETSTREAM_MAXTEXT_IMAGE}:${JETSTREAM_MAXTEXT_VERSION}
            entrypoint: "/bin/sh"
            commands:
              - "-c"
              - echo "Converting checkpoint from bf16 to maxtext/unscanned format" && cd /maxtext && JAX_PLATFORMS='' python3 -m maxtext.checkpoint_conversion.standalone_scripts.convert_deepseek_family_unscanned_ckpt --base_model_path ${LOCAL_CKPT_BASE_PATH}/models/bf16 --maxtext_model_path ${GCS_CKPT_PATH_UNSCANNED} --model_size $MODEL_NAME --use-zarr3 false --use-ocdbt false
      volumes:
        - deviceName: persist
          mountPath: ${LOCAL_CKPT_BASE_PATH}
          mountOptions: rw,async
      computeResource:
        cpuMilli: 224000
        memoryMib: 5676220
# Define the allocation policy for provisioning VMs
allocationPolicy:
  location:
    allowedLocations: ["regions/${CLUSTER_CKPT_NODE_REGION}"]
  instances:
    - policy:
        machineType: ${CLUSTER_CKPT_NODE_MACHINE_TYPE}
        bootDisk:
          type: pd-ssd
          sizeGb: 500
        disks:
          newDisk:
            sizeGb: ${CLUSTER_CKPT_NODE_DISK_SIZE}
            type: pd-ssd
          deviceName: persist
logsPolicy:
  destination: CLOUD_LOGGING
